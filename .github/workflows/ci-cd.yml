# Validate, version, and tag — the branch selects the environment.
#
#   - dev  -> staging      (tag vMAJOR.MINOR.PATCH-dev)
#   - main -> production   (tag vMAJOR.MINOR.PATCH)
#
# The version PATCH is derived from git tags, never committed: package.json holds only
# MAJOR.MINOR, and CI creates + pushes a tag only (no commit, no branch push). A PR is
# blocked until `npm run check:all` passes, and the gate is re-run on the push before any
# tag is created. The deploy job is wired per environment (see DEPLOY.md).

name: ci-cd

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

env:
  NODE_VERSION: '24' # Node major for the gate (keep aligned with .nvmrc)

jobs:
  # Merge gate: PRs into main/dev must pass the quality gate before they can merge. (The merge
  # is *enforced* by branch protection requiring this check — repo config, not expressible here.)
  validate:
    name: validate (merge gate)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read # the gate only reads code — least privilege
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run check:all
      - run: npm run test:release # also gate changes to the release tooling itself

  # Push-side gate + derive the version + create the tag. Runs on push to main OR dev. The gate
  # is mandatory and authoritative; on failure nothing is tagged and no deploy can follow.
  version-and-tag:
    name: version and tag
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Serialize same-branch runs so two pushes can't derive the same patch concurrently.
    concurrency:
      group: version-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write # to push the TAG only (we never push a commit to the branch)
    outputs:
      version: ${{ steps.derive.outputs.version }} # plain number, e.g. 0.1.4
      tag: ${{ steps.derive.outputs.tag }} # git tag, e.g. v0.1.4-dev (staging) or v0.1.4 (prod)
    steps:
      - uses: actions/checkout@v6
        with:
          # A GITHUB_TOKEN-pushed tag does NOT trigger another workflow (GitHub's recursion guard),
          # which is fine: the deploy is a chained `needs:` job in THIS run, so no second event is
          # needed and no personal access token is required.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # full history + tags so derivation is correct (and not mis-derived shallow)

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      # Push-side gate (mandatory): app code must be green, and the release tooling itself must
      # still pass its scenarios, before anything is tagged.
      - run: npm run check:all
      - run: npm run test:release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Derive version and tag
        id: derive
        run: scripts/derive-version.sh "${GITHUB_REF_NAME}"

  # Per-app deploy job (see DEPLOY.md "The deploy job + Cloud Build"). Chains onto the tag job in
  # the same run and deploys the tagged commit to Cloud Run via Cloud Build. The four load-bearing
  # lines (needs / if / checkout ref / --substitutions) are the attach contract — don't change them.
  deploy:
    name: deploy to Cloud Run
    needs: version-and-tag
    if: github.event_name == 'push' && needs.version-and-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write } # id-token for WIF
    env:
      PROJECT_ID: snackbyte-apps
      REGION: us-central1
      WIF_PROVIDER: projects/917114118367/locations/global/workloadIdentityPools/github-pool/providers/github-provider
      DEPLOY_SA: snackbyte-deployer@snackbyte-apps.iam.gserviceaccount.com
    steps:
      - uses: actions/checkout@v6
        with: { ref: '${{ needs.version-and-tag.outputs.tag }}', fetch-depth: 0 }
      - name: Select environment from branch
        id: target
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "service=snackbyte-site-staging" >> "$GITHUB_OUTPUT"
            echo "app_env=staging" >> "$GITHUB_OUTPUT"
            echo "is_production=false" >> "$GITHUB_OUTPUT"
          else
            echo "service=snackbyte-site" >> "$GITHUB_OUTPUT"
            echo "app_env=" >> "$GITHUB_OUTPUT"
            echo "is_production=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: google-github-actions/auth@v2
        with:
          {
            workload_identity_provider: '${{ env.WIF_PROVIDER }}',
            service_account: '${{ env.DEPLOY_SA }}',
          }
      - uses: google-github-actions/setup-gcloud@v2
      - name: Build & deploy via Cloud Build
        run: |
          TAG="${{ needs.version-and-tag.outputs.tag }}"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions="TAG_NAME=${TAG},SHORT_SHA=${SHORT_SHA},_SERVICE=${{ steps.target.outputs.service }},_APP_ENV=${{ steps.target.outputs.app_env }},_APP_IS_PRODUCTION=${{ steps.target.outputs.is_production }}" \
            --service-account="projects/${PROJECT_ID}/serviceAccounts/${DEPLOY_SA}" \
            --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET \
            --project="$PROJECT_ID" --region="$REGION" .
